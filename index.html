<!-- PWA: 설치 프롬프트 캡처 + 서비스워커 등록 (매니페스트/아이콘은 실제 파일 사용) -->
<script>
(function () {
  // ---- 설치 프롬프트 캡처 (React에서 window.__deferredPrompt 로 사용) ----
  window.__deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    window.__deferredPrompt = e;
    window.dispatchEvent(new Event('pwa-installable'));
  });
  window.addEventListener('appinstalled', function () {
    window.__deferredPrompt = null;
    try { localStorage.setItem('famcal_installed', '1'); } catch (e) {}
    window.dispatchEvent(new Event('pwa-installed'));
  });

  // ---- 서비스워커: 같은 폴더에 service-worker.js 가 있으면 등록 (없어도 앱은 정상 동작) ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('./service-worker.js', { scope: './' })
        .catch(function () { /* 없으면 조용히 무시 — 설치는 매니페스트만으로 동작 */ });
    });
  }
})();
</script>

/* =========================================================================

const pad2 = n => String(n).padStart(2,"0");
const toKey = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const keyToDate = k => { const [y,m,dd]=k.split("-").map(Number); return new Date(y,m-1,dd); };
const startOfDay = d => new Date(d.getFullYear(),d.getMonth(),d.getDate());
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const addMonths = (d,n) => { const x=new Date(d); x.setMonth(x.getMonth()+n); return x; };
const sameDay = (a,b) => a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
const WEEKDAYS = ["일","월","화","수","목","금","토"];

function monthGridDays(viewDate){
  const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
  const start = addDays(first, -first.getDay()); // 일요일 시작
  return Array.from({length:42}, (_,i)=>addDays(start,i));
}
function weekDays(viewDate){
  const start = addDays(viewDate, -viewDate.getDay());
  return Array.from({length:7}, (_,i)=>addDays(start,i));
}
function fmtRangeTitle(view, d){
  if(view==="week"){
    const days = weekDays(d);
    const a=days[0], b=days[6];
    return `${a.getMonth()+1}월 ${a.getDate()}일 – ${b.getMonth()+1}월 ${b.getDate()}일`;
  }
  return `${d.getFullYear()}년 ${d.getMonth()+1}월`;
}
function fmtTime(iso){
  const d=new Date(iso);
  let h=d.getHours(); const m=d.getMinutes();
  const ap = h<12 ? "오전" : "오후";
  h = h%12; if(h===0) h=12;
  return m===0 ? `${ap} ${h}시` : `${ap} ${h}:${pad2(m)}`;
}

/* 반복 일정을 [rangeStart, rangeEnd] (일 단위)로 펼치기 */
function expandOccurrences(events, rangeStart, rangeEnd){
  const map = {}; // dayKey -> [occ]
  const rs = startOfDay(rangeStart), re = startOfDay(rangeEnd);
  const push = (dayKey, ev, occStart) => {
    (map[dayKey] = map[dayKey] || []).push({ ...ev, _occKey: `${ev.id}__${dayKey}`, _occStart: occStart });
  };
  for(const ev of events){
    if(!ev.start) continue;
    const base = new Date(ev.start);
    const baseDay = startOfDay(base);
    const repeat = ev.repeat || "none";
    if(repeat==="none"){
      if(baseDay>=rs && baseDay<=re) push(toKey(baseDay), ev, ev.start);
      continue;
    }
    for(let d=new Date(rs); d<=re; d=addDays(d,1)){
      if(d<baseDay) continue;
      let hit=false;
      if(repeat==="daily") hit=true;
      else if(repeat==="weekly") hit = (d.getDay()===baseDay.getDay());
      else if(repeat==="monthly") hit = (d.getDate()===baseDay.getDate());
      if(hit){
        const occStart = new Date(d); occStart.setHours(base.getHours(),base.getMinutes(),0,0);
        push(toKey(d), ev, occStart.toISOString());
      }
    }
  }
  // 정렬: 종일 먼저, 그다음 시간순
  for(const k in map){
    map[k].sort((a,b)=>{
      if(a.allDay && !b.allDay) return -1;
      if(!a.allDay && b.allDay) return 1;
      return new Date(a._occStart) - new Date(b._occStart);
    });
  }
  return map;
}

const LS_EVENTS="famcal_events_v1", LS_MEMBERS="famcal_members_v1";
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : "id"+Date.now()+Math.random().toString(16).slice(2));

const store = {
  online: !!fdb,
  subscribeMembers(cb){
    if(fdb){
      return fdb.collection("members").onSnapshot(async snap=>{
        // 시드 멤버 중 아직 없는 것만 추가 (기존 멤버·데이터는 그대로 유지)
        const existing = new Set(snap.docs.map(d=>d.id));
        for(const m of MEMBER_SEED){
          if(!existing.has(m.id)){ try{ await fdb.collection("members").doc(m.id).set(m); }catch(e){} }
        }
        if(snap.empty) return; // 방금 시드했으면 다음 스냅샷에서 반영됨
        cb(snap.docs.map(d=>({id:d.id, ...d.data()})));
      });
    }
    // local
    let list = readLS(LS_MEMBERS, null) || [];
    let changed=false;
    for(const m of MEMBER_SEED){ if(!list.find(x=>x.id===m.id)){ list.push(m); changed=true; } }
    if(changed) writeLS(LS_MEMBERS, list);
    cb(list);
    return ()=>{};
  },
  subscribeEvents(cb){
    if(fdb){
      return fdb.collection("events").onSnapshot(snap=>{
        cb(snap.docs.map(d=>({id:d.id, ...d.data()})));
      });
    }
    cb(readLS(LS_EVENTS, []));
    const handler = ()=>cb(readLS(LS_EVENTS, []));
    window.addEventListener("famcal-local-change", handler);
    return ()=>window.removeEventListener("famcal-local-change", handler);
  },
  async addEvent(ev){
    if(fdb){ await fdb.collection("events").add(ev); return; }
    const list = readLS(LS_EVENTS, []); list.push({ id:uid(), ...ev });
    writeLS(LS_EVENTS, list); fireLocal();
  },
  async updateEvent(id, ev){
    if(fdb){ await fdb.collection("events").doc(id).update(ev); return; }
    const list = readLS(LS_EVENTS, []).map(e=>e.id===id?{...e,...ev}:e);
    writeLS(LS_EVENTS, list); fireLocal();
  },
  async deleteEvent(id){
    if(fdb){ await fdb.collection("events").doc(id).delete(); return; }
    writeLS(LS_EVENTS, readLS(LS_EVENTS, []).filter(e=>e.id!==id)); fireLocal();
  }
};
function readLS(k, fb){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fb; }catch(e){ return fb; } }
function writeLS(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function fireLocal(){ window.dispatchEvent(new Event("famcal-local-change")); }

function Gate({onPass}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{ inputRef.current && inputRef.current.focus(); },[]);
  const submit=()=>{
    if(pw===FAMILY_PASSWORD){ try{localStorage.setItem("famcal_auth","1");}catch(e){} onPass(); }
    else { setErr(true); setPw(""); setTimeout(()=>setErr(false),450); }
  };
  return (
    <div className="min-h-[100dvh] flex items-center justify-center px-6"
      style={{background:"radial-gradient(120% 80% at 50% 0%, rgba(59,130,246,.10), transparent 60%)"}}>

          <p className="text-center text-sm text-slate-400 mb-6">비밀번호를 입력해 주세요</p>
          <input
            ref={inputRef} type="password" inputMode="numeric" pattern="[0-9]*"
            value={pw} onChange={e=>setPw(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") submit(); }}
            placeholder="••••"
            className={"w-full text-center text-2xl tracking-[.5em] tnum px-4 py-3 rounded-2xl border transition "+
              "bg-slate-50 dark:bg-slate-900/60 "+

          {err && <p className="text-center text-sm text-red-500 mt-3">비밀번호가 맞지 않아요</p>}

/* =========================================================================
   설치 배너 (PWA)
   ========================================================================= */
function InstallBanner(){
  const isStandalone = () =>
    window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const [canPrompt,setCanPrompt]=useState(!!window.__deferredPrompt);
  const [show,setShow]=useState(false);

  useEffect(()=>{
    if(isStandalone()) return;
    if(readLS("famcal_installed",null)==="1") return;
    if(readLS("famcal_install_dismissed",null)==="1") return;
    const onReady=()=>{ setCanPrompt(true); setShow(true); };
    const onDone=()=>setShow(false);
    window.addEventListener("pwa-installable", onReady);
    window.addEventListener("pwa-installed", onDone);
    // iOS 는 자동 프롬프트가 없어 안내만
    if(isIOS) setShow(true);
    if(window.__deferredPrompt) setShow(true);
    return ()=>{ window.removeEventListener("pwa-installable",onReady); window.removeEventListener("pwa-installed",onDone); };
  },[]);

  if(!show) return null;
  const dismiss=()=>{ writeLS("famcal_install_dismissed","1"); setShow(false); };
  const install=async()=>{
    const dp=window.__deferredPrompt;
    if(dp){ dp.prompt(); try{ await dp.userChoice; }catch(e){} window.__deferredPrompt=null; setShow(false); }
  };

  return (
    <div className="fixed inset-x-0 bottom-0 z-40 p-4 anim-slideup" style={{paddingBottom:"max(1rem, env(safe-area-inset-bottom))"}}>
      <div className="max-w-md mx-auto bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-100 dark:border-slate-700 p-4 flex items-center gap-3">
        <div className="w-11 h-11 rounded-xl flex items-center justify-center shrink-0"
             style={{background:"linear-gradient(135deg,#3B82F6,#2563EB)"}}>
          <Icon name="download" className="w-5 h-5 text-white"/>
        </div>
        <div className="flex-1 min-w-0">
          <p className="font-semibold text-sm">홈 화면에 앱으로 설치</p>
          {isIOS && !canPrompt
            ? <p className="text-xs text-slate-400 mt-0.5">공유 <span className="font-semibold">↑</span> → “홈 화면에 추가”를 눌러주세요</p>
            : <p className="text-xs text-slate-400 mt-0.5">앱처럼 빠르게 열 수 있어요</p>}
        </div>
        {canPrompt && !isIOS &&
          <button onClick={install} className="px-4 py-2 rounded-xl bg-blue-500 hover:bg-blue-600 text-white text-sm font-semibold transition shrink-0">설치</button>}
        <button onClick={dismiss} aria-label="닫기" className="w-8 h-8 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center justify-center shrink-0">
          <Icon name="x" className="w-4 h-4"/>
        </button>
      </div>
    </div>
  );
}

/* =========================================================================
   일정 모달 (추가 / 수정)
   ========================================================================= */
function EventModal({members, initial, onClose, onSave, onDelete}){
  const editing = !!initial.id;
  const [title,setTitle]=useState(initial.title||"");
  const [memberId,setMemberId]=useState(initial.memberId||members[0]?.id||"dad");
  const [allDay,setAllDay]=useState(initial.allDay??false);
  const [startDate,setStartDate]=useState(initial.startDate);
  const [startTime,setStartTime]=useState(initial.startTime||"09:00");
  const [endDate,setEndDate]=useState(initial.endDate||initial.startDate);
  const [endTime,setEndTime]=useState(initial.endTime||"10:00");
  const [location,setLocation]=useState(initial.location||"");
  const [memo,setMemo]=useState(initial.memo||"");
  const [repeat,setRepeat]=useState(initial.repeat||"none");

  const member = members.find(m=>m.id===memberId) || members[0];

  const save=()=>{
    if(!title.trim()){ return; }
    const start = allDay ? new Date(`${startDate}T00:00:00`) : new Date(`${startDate}T${startTime}:00`);
    const end   = allDay ? new Date(`${endDate}T23:59:59`)   : new Date(`${endDate}T${endTime}:00`);
    const payload = {
      title: title.trim(), memberId, color: member?.color||"#3B82F6",
      allDay, start: start.toISOString(), end: end.toISOString(),
      location: location.trim(), memo: memo.trim(), repeat,
    };
    onSave(payload, initial.id);
  };

  const field="w-full px-3.5 py-2.5 rounded-xl bg-slate-50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700 text-sm";
  const lab="text-xs font-medium text-slate-400 mb-1.5 flex items-center gap-1.5";

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center anim-fade" onMouseDown={onClose}
         style={{background:"rgba(15,20,30,.45)", backdropFilter:"blur(2px)"}}>
      <div className="bg-white dark:bg-slate-800 w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl anim-pop max-h-[92dvh] overflow-y-auto thin-scroll"
           onMouseDown={e=>e.stopPropagation()}>
        <div className="p-5 sm:p-6">
          <div className="flex items-center justify-between mb-5">
            <h2 className="text-lg font-bold">{editing?"일정 수정":"새 일정"}</h2>
            <button onClick={onClose} aria-label="닫기" className="w-9 h-9 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center justify-center">
              <Icon name="x"/>
            </button>
          </div>

          <div className="space-y-4">
            <div>
              <div className={lab}>제목</div>
              <input autoFocus value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 병원 예약, 유치원 상담" className={field}/>
            </div>

            <div>
              <div className={lab}>누구</div>
              <div className="flex gap-2">
                {members.map(m=>(
                  <button key={m.id} onClick={()=>setMemberId(m.id)}
                    className={"flex-1 py-2.5 rounded-xl text-sm font-semibold border-2 transition "+
                      (memberId===m.id ? "text-white" : "text-slate-500 dark:text-slate-300 border-transparent")}
                    style={ memberId===m.id
                      ? {background:m.color, borderColor:m.color}
                      : {background:tint(m.color,"18"), borderColor:"transparent"} }>
                    {m.name}
                  </button>
                ))}
              </div>
            </div>

            <label className="flex items-center justify-between py-1 cursor-pointer">
              <span className="text-sm font-medium">종일</span>
              <button onClick={()=>setAllDay(v=>!v)} aria-label="종일 토글"
                className={"relative w-12 h-7 rounded-full transition "+(allDay?"bg-blue-500":"bg-slate-300 dark:bg-slate-600")}>
                <span className={"absolute top-0.5 left-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform "+(allDay?"translate-x-5":"")}/>
              </button>
            </label>

            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className={lab}>시작</div>
                <input type="date" value={startDate} onChange={e=>{ setStartDate(e.target.value); if(e.target.value>endDate) setEndDate(e.target.value); }} className={field}/>
              </div>
              {!allDay &&
                <div>
                  <div className={lab}><Icon name="clock" className="w-3.5 h-3.5"/>시간</div>
                  <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} className={field}/>
                </div>}
              <div>
                <div className={lab}>종료</div>
                <input type="date" value={endDate} min={startDate} onChange={e=>setEndDate(e.target.value)} className={field}/>
              </div>
              {!allDay &&
                <div>
                  <div className={lab}><Icon name="clock" className="w-3.5 h-3.5"/>시간</div>
                  <input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)} className={field}/>
                </div>}
            </div>

            <div>
              <div className={lab}><Icon name="repeat" className="w-3.5 h-3.5"/>반복</div>
              <select value={repeat} onChange={e=>setRepeat(e.target.value)} className={field}>
                {Object.entries(REPEAT_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
            </div>

            <div>
              <div className={lab}><Icon name="pin" className="w-3.5 h-3.5"/>장소</div>
              <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="선택 입력" className={field}/>
            </div>

            <div>
              <div className={lab}><Icon name="note" className="w-3.5 h-3.5"/>메모</div>
              <textarea value={memo} onChange={e=>setMemo(e.target.value)} rows={2} placeholder="선택 입력" className={field+" resize-none"}/>
            </div>
          </div>

          <div className="flex gap-2 mt-6">
            {editing &&
              <button onClick={()=>onDelete(initial.id)} aria-label="삭제"
                className="px-4 py-3 rounded-xl bg-red-50 dark:bg-red-500/10 text-red-500 hover:bg-red-100 dark:hover:bg-red-500/20 transition flex items-center justify-center">
                <Icon name="trash" className="w-5 h-5"/>
              </button>}
            <button onClick={save}
              className="flex-1 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-semibold transition shadow-lg shadow-blue-500/25 disabled:opacity-40"
              disabled={!title.trim()}>
              {editing?"저장":"추가"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   월간 뷰
   ========================================================================= */
function MonthView({viewDate, dayMap, selectedKey, onSelectDay, onDropMove}){
  const days = monthGridDays(viewDate);
  const todayKey = toKey(new Date());
  const curMonth = viewDate.getMonth();
  const [dragKey,setDragKey]=useState(null);

  return (
    <div>
      <div className="grid grid-cols-7 mb-1">
        {WEEKDAYS.map((w,i)=>(
          <div key={w} className={"text-center text-[11px] font-semibold py-1.5 "+
            (i===0?"text-red-400":i===6?"text-blue-400":"text-slate-400")}>{w}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {days.map(d=>{
          const k=toKey(d);
          const inMonth = d.getMonth()===curMonth;
          const isToday = k===todayKey;
          const isSel = k===selectedKey;
          const holiday = HOLIDAYS[k];
          const dow=d.getDay();
          const evs = dayMap[k]||[];
          // 구성원 색상 점 (중복 색 제거, 최대 4개)
          const colors=[]; for(const ev of evs){ if(!colors.includes(ev.color)) colors.push(ev.color); if(colors.length>=4) break; }
          const dateColor = holiday||dow===0 ? "text-red-500" : dow===6 ? "text-blue-500" : (inMonth?"text-slate-700 dark:text-slate-200":"text-slate-300 dark:text-slate-600");
          return (
            <button key={k} type="button"
              onClick={()=>onSelectDay(k)}
              onDragOver={e=>{ e.preventDefault(); setDragKey(k); }}
              onDragLeave={()=>setDragKey(cur=>cur===k?null:cur)}
              onDrop={e=>{ e.preventDefault(); setDragKey(null); const id=e.dataTransfer.getData("text/plain"); if(id) onDropMove(id,k); }}
              className={"relative aspect-square sm:aspect-auto sm:min-h-[58px] rounded-xl p-1 flex flex-col items-center justify-start transition border no-focus-ring "+
                (dragKey===k?"drag-over ":"")+
                (isSel
                  ? "bg-blue-500 border-blue-500 text-white shadow-md shadow-blue-500/25"
                  : isToday
                    ? "bg-blue-50 dark:bg-blue-500/10 border-blue-200 dark:border-blue-500/30"
                    : "bg-white dark:bg-slate-800/60 border-slate-100 dark:border-slate-700/50 hover:border-slate-200 dark:hover:border-slate-600")}>
              <span className={"text-[13px] font-semibold tnum mt-0.5 "+
                (isSel ? "text-white" : dateColor+" ")+
                (isToday && !isSel ? "inline-flex items-center justify-center w-6 h-6 rounded-full bg-blue-500 text-white" : "")}>
                {d.getDate()}
              </span>
              {/* 일정 점 */}
              <div className="flex items-center gap-0.5 mt-1 h-1.5">
                {colors.map((c,i)=>(
                  <span key={i} className="w-1.5 h-1.5 rounded-full"
                    style={{ background: isSel ? "#ffffff" : c, opacity: isSel? .9:1 }}/>
                ))}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* 선택한 날짜의 일정만 보여주는 패널 */
function DayDetail({dateKey, dayMap, onEventClick, onAdd}){
  const d = keyToDate(dateKey);
  const dow = d.getDay();
  const evs = dayMap[dateKey]||[];

  const isToday = dateKey===toKey(new Date());

    <div className="mt-4 bg-white dark:bg-slate-800/60 rounded-2xl border border-slate-100 dark:border-slate-700/50 p-4">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-baseline gap-2">
          <span className={"text-lg font-bold tnum "+(holiday||dow===0?"text-red-500":dow===6?"text-blue-500":"")}>
            {d.getMonth()+1}월 {d.getDate()}일
          </span>
          <span className="text-sm text-slate-400">{WEEKDAYS[dow]}요일</span>
          {isToday && <span className="text-[10px] font-semibold text-white bg-blue-500 rounded-full px-2 py-0.5">오늘</span>}
          {holiday && <span className="text-xs text-red-400">{holiday}</span>}
        </div>
        <button onClick={onAdd} className="inline-flex items-center gap-1 text-sm font-semibold text-blue-500 hover:text-blue-600 transition">
          <Icon name="plus" className="w-4 h-4"/> 추가
        </button>
      </div>
      {evs.length===0
        ? <div className="text-sm text-slate-300 dark:text-slate-600 py-6 text-center">이 날은 일정이 없어요</div>
        : <div className="space-y-2">
            {evs.map(ev=>(
              <div key={ev._occKey} onClick={()=>onEventClick(ev)}
                className="flex items-center gap-3 p-3 rounded-xl bg-slate-50 dark:bg-slate-900/40 border border-slate-100 dark:border-slate-700/40 cursor-pointer hover:border-slate-200 dark:hover:border-slate-600 transition">
                <span className="w-1.5 h-10 rounded-full shrink-0" style={{background:ev.color}}/>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate">{ev.title}</div>
                  {ev.location && <div className="text-xs text-slate-400 truncate flex items-center gap-1"><Icon name="pin" className="w-3 h-3"/>{ev.location}</div>}
                  {ev.memo && !ev.location && <div className="text-xs text-slate-400 truncate">{ev.memo}</div>}
                </div>
                <div className="text-xs text-slate-400 text-right shrink-0">
                  {ev.allDay?"종일":fmtTime(ev._occStart)}
                  {(ev.repeat&&ev.repeat!=="none") && <div className="text-[10px] text-slate-300 dark:text-slate-500">{REPEAT_LABELS[ev.repeat]}</div>}
                </div>
              </div>
            ))}
          </div>}
    </div>
  );
}

/* 홈 화면 위젯처럼 오늘을 한눈에 보여주는 요약 카드 */
function WidgetCard({dayMap, onClose, onOpenToday}){
  const now = new Date();
  const todayKey = toKey(now);
  const todays = dayMap[todayKey] || [];
  // 오늘 이후 가장 가까운 일정 (오늘 제외)
  let next=null;
  const keys=Object.keys(dayMap).sort();
  for(const k of keys){
    if(k<=todayKey) continue;
    if((dayMap[k]||[]).length){ next={ day:k, ev:dayMap[k][0] }; break; }
  }
  const dow=now.getDay();
  return (
    <div className="mb-4 rounded-3xl p-5 text-white shadow-xl shadow-blue-500/20 anim-pop relative overflow-hidden"
         style={{background:"linear-gradient(135deg,#3B82F6 0%,#2563EB 60%,#1D4ED8 100%)"}}>
      {/* 장식 원 */}
      <div className="absolute -right-8 -top-10 w-40 h-40 rounded-full" style={{background:"rgba(255,255,255,.08)"}}/>
      <div className="absolute -right-2 top-16 w-24 h-24 rounded-full" style={{background:"rgba(255,255,255,.06)"}}/>
      <div className="flex items-start justify-between relative">
        <div onClick={onOpenToday} className="cursor-pointer">
          <div className="text-xs font-medium text-blue-100">위젯 · 오늘</div>
          <div className="flex items-end gap-2 mt-0.5">
            <span className="text-4xl font-bold tnum leading-none">{now.getDate()}</span>
            <span className="text-sm text-blue-100 pb-0.5">{now.getMonth()+1}월 {WEEKDAYS[dow]}요일</span>
          </div>
        </div>
        <button onClick={onClose} aria-label="위젯 끄기"
          className="w-8 h-8 rounded-lg flex items-center justify-center text-blue-100 hover:bg-white/15 transition shrink-0">
          <Icon name="x" className="w-4 h-4"/>
        </button>
      </div>

      <div className="mt-4 relative">
        {todays.length===0
          ? <div className="text-sm text-blue-100">
              오늘 일정이 없어요.
              {next && <span className="block mt-1 text-white/90">
                다음 · {keyToDate(next.day).getMonth()+1}/{keyToDate(next.day).getDate()} <span className="font-semibold">{next.ev.title}</span>
              </span>}
            </div>
          : <div className="space-y-1.5">
              {todays.slice(0,3).map(ev=>(
                <div key={ev._occKey} className="flex items-center gap-2.5 bg-white/12 rounded-xl px-3 py-2">
                  <span className="w-2 h-2 rounded-full shrink-0" style={{background:ev.color, boxShadow:"0 0 0 2px rgba(255,255,255,.6)"}}/>
                  <span className="text-sm font-medium truncate flex-1">{ev.title}</span>
                  <span className="text-xs text-blue-100 shrink-0">{ev.allDay?"종일":fmtTime(ev._occStart)}</span>
                </div>
              ))}
              {todays.length>3 && <div className="text-xs text-blue-100 pl-1">외 {todays.length-3}개</div>}
            </div>}
      </div>
    </div>
  );
}

/* =========================================================================
   주간 뷰 (모바일 친화 세로 리스트)
   ========================================================================= */
function WeekView({viewDate, dayMap, onDayClick, onEventClick}){
  const days = weekDays(viewDate);
  const todayKey=toKey(new Date());
  return (
    <div className="space-y-2">
      {days.map(d=>{
        const k=toKey(d); const evs=dayMap[k]||[]; const isToday=k===todayKey;
        const holiday=HOLIDAYS[k]; const dow=d.getDay();
        return (
          <div key={k} onClick={()=>onDayClick(k)}
            className={"rounded-2xl p-3 cursor-pointer border transition "+
              (isToday?"bg-blue-50 dark:bg-blue-500/10 border-blue-200 dark:border-blue-500/30":"bg-white dark:bg-slate-800/60 border-slate-100 dark:border-slate-700/50")}>
            <div className="flex items-center gap-2 mb-1.5">
              <span className={"text-sm font-bold tnum "+(holiday||dow===0?"text-red-500":dow===6?"text-blue-500":"")}>{d.getMonth()+1}.{d.getDate()}</span>
              <span className="text-xs text-slate-400">{WEEKDAYS[dow]}</span>
              {isToday && <span className="text-[10px] font-semibold text-white bg-blue-500 rounded-full px-2 py-0.5">오늘</span>}
              {holiday && <span className="text-[11px] text-red-400">{holiday}</span>}

            {evs.length===0

              : <div className="space-y-1">
                  {evs.map(ev=>(
                    <div key={ev._occKey} onClick={e=>{e.stopPropagation(); onEventClick(ev);}}

                      <span className="w-2 h-2 rounded-full shrink-0" style={{background:ev.color}}/>
                      <span className="text-sm font-medium truncate flex-1">{ev.title}</span>

        );
      })}
    </div>
  );
}

              <span className="text-xs text-slate-400">{WEEKDAYS[dow]}요일</span>
              {sameDay(d,new Date()) && <span className="text-[10px] font-semibold text-white bg-blue-500 rounded-full px-2 py-0.5">오늘</span>}

                  <span className="w-1.5 h-10 rounded-full shrink-0" style={{background:ev.color}}/>
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm truncate">{ev.title}</div>
                    {ev.location && <div className="text-xs text-slate-400 truncate">{ev.location}</div>}

function Empty({text}){
  return <div className="text-center text-sm text-slate-300 dark:text-slate-600 py-16">{text}</div>;
}

/* =========================================================================
   다가오는 일정 패널
   ========================================================================= */
function UpcomingPanel({dayMap, members, filter, onToggle, onEventClick}){
  const today=startOfDay(new Date());
  const items=[];
  Object.keys(dayMap).sort().forEach(k=>{
    if(keyToDate(k)<today) return;
    dayMap[k].forEach(ev=>items.push({...ev, _day:k}));
  });
  items.sort((a,b)=>new Date(a._occStart)-new Date(b._occStart));
  const top=items.slice(0,7);
  return (
    <div className="space-y-5">
      <div>
        <h3 className="text-xs font-semibold text-slate-400 mb-2 px-1">구성원</h3>
        <div className="flex flex-wrap gap-2">
          {members.map(m=>{
            const on=filter[m.id];
            return (
              <button key={m.id} onClick={()=>onToggle(m.id)}
                className={"inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium border-2 transition "+(on?"text-white":"opacity-50")}
                style={ on ? {background:m.color, borderColor:m.color} : {borderColor:m.color, color:m.color} }>
                <span className={"w-2 h-2 rounded-full "+(on?"bg-white":"")} style={on?{}:{background:m.color}}/>
                {m.name}
              </button>
            );
          })}
        </div>
      </div>
      <div>
        <h3 className="text-xs font-semibold text-slate-400 mb-2 px-1">다가오는 일정</h3>
        {top.length===0
          ? <div className="text-xs text-slate-300 dark:text-slate-600 px-1 py-4">예정된 일정이 없어요</div>
          : <div className="space-y-1.5">
              {top.map(ev=>{
                const d=keyToDate(ev._day);
                return (
                  <div key={ev._occKey} onClick={()=>onEventClick(ev)}
                    className="flex items-center gap-2.5 p-2.5 rounded-xl bg-white dark:bg-slate-800/60 border border-slate-100 dark:border-slate-700/50 cursor-pointer hover:border-slate-200 dark:hover:border-slate-600 transition">
                    <div className="flex flex-col items-center justify-center w-9 shrink-0">
                      <span className="text-[10px] text-slate-400 leading-none">{d.getMonth()+1}월</span>
                      <span className="text-base font-bold tnum leading-tight" style={{color:ev.color}}>{d.getDate()}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium truncate">{ev.title}</div>
                      <div className="text-xs text-slate-400">{ev.allDay?"종일":fmtTime(ev._occStart)}</div>
                    </div>
                  </div>
                );
              })}
            </div>}
      </div>
    </div>
  );
}

/* =========================================================================
   메인 앱
   ========================================================================= */
function App(){
  const [authed,setAuthed]=useState(()=>readLS("famcal_auth",null)==="1");
  const [dark,setDark]=useState(()=>{
    const s=readLS("famcal_theme",null);
    if(s) return s==="dark";
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  });
  const [members,setMembers]=useState(MEMBER_SEED);
  const [events,setEvents]=useState([]);
  const [viewDate,setViewDate]=useState(new Date());
  const [view,setView]=useState("month"); // month | week | agenda
  const [filter,setFilter]=useState(()=>Object.fromEntries(MEMBER_SEED.map(m=>[m.id,true])));
  const [modal,setModal]=useState(null); // {initial}
  const [selectedKey,setSelectedKey]=useState(()=>toKey(new Date())); // 월간 뷰에서 선택된 날짜
  const [widgetOn,setWidgetOn]=useState(()=>readLS("famcal_widget",null)==="1"); // 위젯 요약 카드 표시
  useEffect(()=>{ writeLS("famcal_widget", widgetOn?"1":"0"); },[widgetOn]);

  useEffect(()=>{ document.documentElement.classList.toggle("dark",dark); writeLS("famcal_theme",dark?"dark":"light"); },[dark]);
  useEffect(()=> store.subscribeMembers(list=>{
    setMembers(list);
    setFilter(f=>{ const nf={...f}; list.forEach(m=>{ if(!(m.id in nf)) nf[m.id]=true; }); return nf; });
  }),[]);
  useEffect(()=> store.subscribeEvents(setEvents),[]);

  const visibleEvents = useMemo(()=>events.filter(e=>filter[e.memberId]!==false),[events,filter]);

  // 펼칠 범위: 화면에 필요한 범위 + 다가오는 90일
  const range = useMemo(()=>{
    let start, end;
    if(view==="week"){ const d=weekDays(viewDate); start=d[0]; end=d[6]; }
    else { const g=monthGridDays(viewDate); start=g[0]; end=g[41]; }
    const far = addDays(new Date(), 90);
    if(end<far) end=far;
    return {start, end};
  },[view,viewDate]);

  const dayMap = useMemo(()=>expandOccurrences(visibleEvents, range.start, range.end),[visibleEvents,range]);

  const openNew = (dayKey)=>{
    const dk = dayKey || selectedKey || toKey(new Date());
    setModal({ initial:{ startDate:dk, endDate:dk, startTime:"09:00", endTime:"10:00", allDay:false } });
  };
  const openEdit = (occ)=>{
    const s=new Date(occ.start), e=new Date(occ.end);
    setModal({ initial:{
      id:occ.id, title:occ.title, memberId:occ.memberId, allDay:occ.allDay,
      startDate:toKey(s), startTime:`${pad2(s.getHours())}:${pad2(s.getMinutes())}`,
      endDate:toKey(e), endTime:`${pad2(e.getHours())}:${pad2(e.getMinutes())}`,
      location:occ.location, memo:occ.memo, repeat:occ.repeat||"none",
    }});
  };
  const handleSave = async (payload,id)=>{
    if(id) await store.updateEvent(id,payload); else await store.addEvent(payload);
    setModal(null);
  };
  const handleDelete = async (id)=>{ await store.deleteEvent(id); setModal(null); };

  // 드래그로 날짜 이동 (반복 없는 일정만)
  const handleDropMove = async (id, dayKey)=>{
    const ev=events.find(e=>e.id===id); if(!ev) return;
    const s=new Date(ev.start), e=new Date(ev.end);
    const dur=e-s;
    const [y,m,dd]=dayKey.split("-").map(Number);
    const ns=new Date(y,m-1,dd,s.getHours(),s.getMinutes(),0,0);
    const ne=new Date(ns.getTime()+dur);
    await store.updateEvent(id,{ start:ns.toISOString(), end:ne.toISOString() });
  };

  const goToday=()=>{ setViewDate(new Date()); setSelectedKey(toKey(new Date())); };
  const goPrev=()=>setViewDate(d=>view==="week"?addDays(d,-7):addMonths(d,-1));
  const goNext=()=>setViewDate(d=>view==="week"?addDays(d,7):addMonths(d,1));

  if(!authed) return <Gate onPass={()=>setAuthed(true)}/>;

  const ViewTab=({id,label})=>(
    <button onClick={()=>setView(id)}
      className={"px-3.5 py-1.5 rounded-lg text-sm font-medium transition "+
        (view===id?"bg-white dark:bg-slate-700 text-slate-800 dark:text-white shadow-sm":"text-slate-500 dark:text-slate-400")}>
      {label}
    </button>
  );

  return (
    <div className="min-h-[100dvh]">
      {/* 헤더 */}
      <header className="sticky top-0 z-30 backdrop-blur-md bg-white/80 dark:bg-slate-900/80 border-b border-slate-100 dark:border-slate-800">
        <div className="max-w-6xl mx-auto px-3 sm:px-5 py-3 flex items-center gap-2 sm:gap-3">
          <div className="w-9 h-9 rounded-xl flex items-center justify-center shrink-0 shadow-sm" style={{background:"linear-gradient(135deg,#3B82F6,#2563EB)"}}>
            <Icon name="today" className="w-5 h-5 text-white"/>
          </div>
          <div className="flex items-center gap-1 shrink-0">
            <IconBtn label="이전" onClick={goPrev}><Icon name="chevL"/></IconBtn>
            <IconBtn label="다음" onClick={goNext}><Icon name="chevR"/></IconBtn>
          </div>
          <h1 className="text-base sm:text-lg font-bold tnum flex-1 min-w-0 truncate">{fmtRangeTitle(view,viewDate)}</h1>

          <button onClick={goToday} className="hidden sm:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/60 transition">
            <Icon name="today" className="w-4 h-4"/> 오늘
          </button>
          <div className="hidden sm:flex items-center gap-0.5 p-1 rounded-xl bg-slate-100 dark:bg-slate-800">
            <ViewTab id="month" label="월"/><ViewTab id="week" label="주"/><ViewTab id="agenda" label="목록"/>
          </div>
          <button onClick={()=>setWidgetOn(v=>!v)} aria-label="위젯 표시 전환"
            title={widgetOn?"위젯 켜짐":"위젯 꺼짐"}
            className={"inline-flex items-center gap-1.5 h-10 px-2.5 rounded-xl text-sm font-medium transition shrink-0 "+
              (widgetOn
                ? "bg-blue-500 text-white shadow-sm"
                : "text-slate-500 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/60")}>
            <Icon name="widget" className="w-4 h-4"/>
            <span className="hidden sm:inline">위젯</span>
            <span className={"text-[10px] font-bold px-1.5 py-0.5 rounded-md "+(widgetOn?"bg-white/25":"bg-slate-200 dark:bg-slate-700")}>{widgetOn?"ON":"OFF"}</span>
          </button>
          <IconBtn label={dark?"라이트 모드":"다크 모드"} onClick={()=>setDark(v=>!v)}>
            <Icon name={dark?"sun":"moon"}/>
          </IconBtn>
          <IconBtn label="로그아웃" onClick={()=>{ try{localStorage.removeItem("famcal_auth");}catch(e){} setAuthed(false); }}>
            <Icon name="logout"/>
          </IconBtn>
        </div>
        {/* 모바일 탭바 */}
        <div className="sm:hidden max-w-6xl mx-auto px-3 pb-3 flex items-center gap-2">
          <div className="flex items-center gap-0.5 p-1 rounded-xl bg-slate-100 dark:bg-slate-800 flex-1">
            <div className="flex-1 text-center"><ViewTab id="month" label="월"/></div>
            <div className="flex-1 text-center"><ViewTab id="week" label="주"/></div>
            <div className="flex-1 text-center"><ViewTab id="agenda" label="목록"/></div>
          </div>
          <button onClick={goToday} className="px-3 py-2 rounded-xl text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">오늘</button>
        </div>
      </header>

      {!store.online &&
        <div className="max-w-6xl mx-auto px-4 pt-3">
          <div className="text-xs text-amber-700 dark:text-amber-300 bg-amber-50 dark:bg-amber-500/10 border border-amber-200 dark:border-amber-500/20 rounded-xl px-3 py-2">
            로컬 미리보기 모드입니다. Firebase config를 넣으면 가족끼리 실시간으로 공유돼요. (지금 입력한 일정은 이 브라우저에만 저장됩니다.)
          </div>
        </div>}

      {/* 본문 */}
      <main className="max-w-6xl mx-auto px-3 sm:px-5 py-4 grid lg:grid-cols-[1fr_300px] gap-5">
        <section>
          {widgetOn && <WidgetCard dayMap={dayMap}
            onClose={()=>setWidgetOn(false)}
            onOpenToday={()=>{ setView("month"); setSelectedKey(toKey(new Date())); setViewDate(new Date()); }}/>}
          {view==="month" && <React.Fragment>
            <MonthView viewDate={viewDate} dayMap={dayMap} selectedKey={selectedKey} onSelectDay={setSelectedKey} onDropMove={handleDropMove}/>
            <DayDetail dateKey={selectedKey} dayMap={dayMap} onEventClick={openEdit} onAdd={()=>openNew(selectedKey)}/>
          </React.Fragment>}
          {view==="week"  && <WeekView  viewDate={viewDate} dayMap={dayMap} onDayClick={openNew} onEventClick={openEdit}/>}
          {view==="agenda"&& <AgendaView dayMap={dayMap} onEventClick={openEdit}/>}
        </section>
        <aside className="lg:sticky lg:top-24 lg:self-start">
          <UpcomingPanel dayMap={dayMap} members={members} filter={filter}
            onToggle={id=>setFilter(f=>({...f,[id]:!f[id]}))} onEventClick={openEdit}/>
        </aside>
      </main>

      {/* + 플로팅 버튼 */}
      <button onClick={()=>openNew()} aria-label="일정 추가"
        className="fixed z-30 bottom-6 right-6 w-14 h-14 rounded-2xl bg-blue-500 hover:bg-blue-600 text-white shadow-xl shadow-blue-500/30 flex items-center justify-center transition active:scale-95"
        style={{bottom:"max(1.5rem, env(safe-area-inset-bottom))"}}>
        <Icon name="plus" className="w-7 h-7"/>
      </button>

      {modal && <EventModal members={members} initial={modal.initial} onClose={()=>setModal(null)} onSave={handleSave} onDelete={handleDelete}/>}
      <InstallBanner/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- JSX를 '클래식 런타임(React.createElement)'으로 직접 변환해 실행 -->
<script>
(function () {
  function fail(msg) {
    var root = document.getElementById('root');
    if (root) {
      root.innerHTML =
        '<div style="max-width:680px;margin:40px auto;padding:20px;font-family:Pretendard,system-ui,sans-serif">' +
        '<h2 style="margin:0 0 8px;color:#b91c1c">앱을 불러오지 못했어요</h2>' +
        '<p style="color:#64748b;font-size:14px;margin:0 0 12px">아래 메시지를 개발자에게 알려주세요.</p>' +
        '<pre style="white-space:pre-wrap;background:#fef2f2;color:#b91c1c;padding:12px;border-radius:12px;font-size:12px">' +
        String(msg).replace(/</g, '&lt;') + '</pre></div>';
    }
  }
  try {
    if (!window.Babel) { fail('Babel 로딩 실패 — 인터넷 연결을 확인하세요.'); return; }
    var src = document.getElementById('app-source').textContent;
    var out = Babel.transform(src, {
      presets: [['react', { runtime: 'classic' }]], // 자동 런타임 import 방지
      filename: 'app.jsx'
    }).code;
    (0, eval)(out); // 전역 스코프에서 실행 → React / ReactDOM / firebase 전역 사용 가능
  } catch (e) {
    console.error(e);
    fail(e && e.message ? e.message : e);
  }
})();
</script>
